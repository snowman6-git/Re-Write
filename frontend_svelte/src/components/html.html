<div class="gradient-border-box">
	<span>회전하는 그라데이션 보더</span>
</div>

<style>
	.gradient-border-box {
		position: relative;
		width: 300px;
		height: 200px;
		background: #1a1a1a; /* 내부 배경색 */
		border-radius: 20px;
		display: flex;
		justify-content: center;
		align-items: center;
		overflow: hidden; /* 흘러넘치는 가상 요소를 숨김 */
	}

	/* 회전하는 그라데이션 레이어 */
	.gradient-border-box::before {
		content: '';
		position: absolute;
		width: 100rem; /* 대각선 길이를 고려해 박스보다 크게 설정 */
		height: 150%;
		background: conic-gradient(transparent, #ff00cc, #3333ff, transparent 30%);
		animation: rotate 1s linear infinite;
	}

	/* 내부 콘텐츠를 가리지 않도록 덮어주는 레이어 */
	.gradient-border-box::after {
		content: '';
		position: absolute;
		inset: 4px; /* 테두리 두께 조절 */
		background: #1a1a1a; /* 배경색과 동일하게 */
		border-radius: 16px;
	}

	/* 텍스트가 위로 오게 설정 */
	.gradient-border-box span {
		position: relative;
		z-index: 1;
		color: white;
		font-family: sans-serif;
		font-weight: bold;
	}

	/* 회전 애니메이션 */
	@keyframes rotate {
		from {
			transform: rotate(0deg);
		}
		to {
			transform: rotate(360deg);
		}
	}
</style>
